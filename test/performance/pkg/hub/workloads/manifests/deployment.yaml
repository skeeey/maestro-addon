kind: Deployment
apiVersion: apps/v1
metadata:
  name: {{ .WorkName }}
  namespace: {{ .ClusterName }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: busybox
  template:
    metadata:
      labels:
        app: busybox
    spec:
      containers:
      - name: busybox
        image: 'quay.io/prometheus/busybox:latest'
        args:
        - /bin/sh
        - '-c'
        - 'sleep 3600'
